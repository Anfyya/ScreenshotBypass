name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Setup patched iOS SDK
      run: |
        mkdir -p "$HOME/theos/sdks"
        curl -L https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz -o "$RUNNER_TEMP/iPhoneOS16.5.sdk.tar.xz"
        tar -xf "$RUNNER_TEMP/iPhoneOS16.5.sdk.tar.xz" -C "$HOME/theos/sdks"
        test -d "$HOME/theos/sdks/iPhoneOS16.5.sdk"

    - name: Install ldid
      run: |
        brew install ldid

    - name: Install AltList to Theos
      run: |
        git clone --depth 1 https://github.com/opa334/AltList.git "$RUNNER_TEMP/AltList"
        cd "$RUNNER_TEMP/AltList"
        bash install_to_theos.sh

    - name: Build Tweak
      run: |
        make package FINALPACKAGE=1

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScreenshotBypass-Tweak
        path: packages/*.deb
